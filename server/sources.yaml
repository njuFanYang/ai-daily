# AI/LLM 资讯源清单
# type: rss | hn_algolia | reddit_rss | hf_papers | arxiv_rss | github_releases
# 抓取时按 type 走不同 fetcher。新加源只需在此追加即可。

sources:
  # ---- 一手实验室博客 ----
  - name: anthropic_news
    type: anthropic_html
    url: https://www.anthropic.com/news
    category: lab_official

  - name: anthropic_engineering
    type: anthropic_html
    url: https://www.anthropic.com/engineering
    category: lab_official

  - name: openai_blog
    type: rss
    url: https://openai.com/blog/rss.xml
    category: lab_official

  - name: deepmind_blog
    type: rss
    url: https://deepmind.google/blog/rss.xml
    category: lab_official

  - name: meta_ai
    type: rss
    url: https://ai.meta.com/blog/rss/
    category: lab_official
    enabled: false   # 400, 官网无 RSS, 需 HTML 抓取

  - name: mistral_news
    type: rss
    url: https://mistral.ai/news/rss.xml
    category: lab_official
    enabled: false   # 404, 官网无 RSS, 需 HTML 抓取

  - name: huggingface_blog
    type: rss
    url: https://huggingface.co/blog/feed.xml
    category: community_official

  # ---- 论文聚合 ----
  - name: huggingface_papers
    type: hf_papers
    url: https://huggingface.co/papers
    category: papers

  - name: arxiv_cs_cl
    type: arxiv_rss
    url: http://export.arxiv.org/rss/cs.CL
    category: papers

  - name: arxiv_cs_lg
    type: arxiv_rss
    url: http://export.arxiv.org/rss/cs.LG
    category: papers

  - name: dair_ai_papers
    type: github_releases
    url: https://api.github.com/repos/dair-ai/ML-Papers-of-the-Week/commits
    category: papers

  # ---- 高质量个人/社区博客 ----
  - name: simon_willison
    type: rss
    url: https://simonwillison.net/atom/everything/
    category: individual_expert

  - name: latent_space
    type: rss
    url: https://www.latent.space/feed
    category: community_blog

  - name: import_ai
    type: rss
    url: https://importai.substack.com/feed
    category: newsletter
    enabled: false   # Substack 403, 待修

  - name: ahead_of_ai
    type: rss
    url: https://magazine.sebastianraschka.com/feed
